services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: alpha
      POSTGRES_PASSWORD: alpha123
      POSTGRES_DB: sentiment_alpha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

volumes:
  pgdata:
